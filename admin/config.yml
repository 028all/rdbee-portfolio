backend:
  name: github
  repo: 028all/rdbee-portfolio
  branch: main
  base_url: https://rdbee-oauth.webbynhanle.workers.dev
  auth_endpoint: /auth

  
media_folder: "static/uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "data/settings.json"
        fields:
          - name: "logo_name"
            label: "Logo Name"
            widget: "string"
            default: "Rd Bee"
          - name: "status"
            label: "Header Status Text"
            widget: "string"
            default: "Available for Projects"
          - name: "tagline"
            label: "Hero Eyebrow / Tagline"
            widget: "string"
          - name: "hero_title_line1"
            label: "Hero Title Line 1"
            widget: "string"
            default: "Visual"
          - name: "hero_title_line2"
            label: "Hero Title Line 2"
            widget: "string"
            default: "Brand"
          - name: "hero_title_line3"
            label: "Hero Title Line 3 (italic)"
            widget: "string"
            default: "Identity"
          - name: "hero_desc"
            label: "Hero Description"
            widget: "text"
          - name: "hero_image"
            label: "Hero Image"
            widget: "image"
            required: false
          - name: "hero_image_label"
            label: "Hero Image Label"
            widget: "string"
            default: "Featured 2025"
          - name: "marquee_items"
            label: "Marquee Items"
            widget: "list"
            field:
              name: "item"
              label: "Item"
              widget: "string"
          - name: "about_designer_label"
            label: "About Col 1 Label"
            widget: "string"
            default: "Designer"
          - name: "about_designer_content"
            label: "About Col 1 Content"
            widget: "text"
          - name: "about_designer_sub"
            label: "About Col 1 Sub"
            widget: "text"
          - name: "about_expertise_label"
            label: "About Col 2 Label"
            widget: "string"
            default: "Expertise"
          - name: "about_expertise_content"
            label: "About Col 2 Content"
            widget: "text"
          - name: "about_expertise_sub"
            label: "About Col 2 Sub"
            widget: "text"
          - name: "about_contact_label"
            label: "About Col 3 Label"
            widget: "string"
            default: "Contact"
          - name: "email"
            label: "Email"
            widget: "string"
          - name: "instagram"
            label: "Instagram Handle"
            widget: "string"
            default: "@nnhanlee"
          - name: "instagram_url"
            label: "Instagram URL"
            widget: "string"
          - name: "behance"
            label: "Behance URL"
            widget: "string"
          - name: "behance_label"
            label: "Behance Display Label"
            widget: "string"
            default: "Behance: rdbee"
          - name: "location"
            label: "Location"
            widget: "string"
          - name: "footer_desc"
            label: "Footer Description"
            widget: "text"
          - name: "footer_nav_links"
            label: "Footer Nav Links"
            widget: "list"
            field:
              name: "link"
              label: "Link"
              widget: "string"
          - name: "copyright"
            label: "Copyright Text"
            widget: "string"

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "data/projects"
    create: true
    slug: "{{slug}}"
    extension: "json"
    format: "json"
    fields:
      - name: "title"
        label: "Title"
        widget: "string"
      - name: "category"
        label: "Category"
        widget: "string"
      - name: "client"
        label: "Client"
        widget: "string"
      - name: "year"
        label: "Year"
        widget: "string"
      - name: "scope"
        label: "Scope"
        widget: "string"
      - name: "industry"
        label: "Industry"
        widget: "string"
      - name: "description"
        label: "Description"
        widget: "text"
      - name: "cover_image"
        label: "Cover Image (Grid)"
        widget: "image"
        required: false
      - name: "hero_image"
        label: "Hero Image (Detail Page)"
        widget: "image"
        required: false
      - name: "gallery"
        label: "Gallery Images"
        widget: "list"
        required: false
        field:
          name: "image"
          label: "Image"
          widget: "image"
      - name: "featured"
        label: "Featured in In Focus"
        widget: "boolean"
        default: false
      - name: "order"
        label: "Sort Order"
        widget: "number"
        value_type: "int"
        default: 99

  - name: "brands"
    label: "Brands"
    files:
      - name: "brands_list"
        label: "Brands Dropdown"
        file: "data/brands.json"
        fields:
          - name: "brands"
            label: "Brands"
            widget: "list"
            fields:
              - name: "name"
                label: "Brand Name"
                widget: "string"
              - name: "order"
                label: "Sort Order"
                widget: "number"
                value_type: "int"
              - name: "status"
                label: "Status"
                widget: "select"
                options:
                  - "active"
                  - "coming_soon"
                default: "coming_soon"
              - name: "industry"
                label: "Industry Tag"
                widget: "string"
              - name: "projects"
                label: "Brand Projects"
                widget: "list"
                required: false
                fields:
                  - name: "title"
                    label: "Project Title"
                    widget: "string"
                  - name: "tag"
                    label: "Tag"
                    widget: "string"

  - name: "social"
    label: "Social Strip"
    files:
      - name: "social_items"
        label: "Social Items"
        file: "data/social.json"
        fields:
          - name: "items"
            label: "Social Posts"
            widget: "list"
            fields:
              - name: "label"
                label: "Label"
                widget: "string"
              - name: "image"
                label: "Image"
                widget: "image"
                required: false
              - name: "order"
                label: "Sort Order"
                widget: "number"
                value_type: "int"

  - name: "warehouse"
    label: "The Warehouse (Social Kho)"
    files:
      - name: "warehouse_posts"
        label: "Warehouse Posts"
        file: "data/warehouse.json"
        fields:
          - name: "posts"
            label: "Posts"
            label_singular: "Post"
            widget: "list"
            fields:
              - name: "caption"
                label: "Caption / Nội dung"
                widget: "text"
                required: false
              - name: "format"
                label: "Định dạng khung"
                widget: "select"
                default: "s1_square"
                options:
                  - { label: "Style 1 · 1 ảnh vuông (900×900)", value: "s1_square" }
                  - { label: "Style 1 · 1 ảnh ngang (1200×900)", value: "s1_landscape" }
                  - { label: "Style 1 · 1 ảnh event cover (1200×628)", value: "s1_event" }
                  - { label: "Style 1 · 1 ảnh share link (1200×518)", value: "s1_link" }
                  - { label: "Style 1 · 1 ảnh story (1080×1920)", value: "s1_story" }
                  - { label: "Style 2 · 2 ảnh vuông cạnh nhau", value: "s2" }
                  - { label: "Style 3 · 2 ảnh dọc cạnh nhau", value: "s3" }
                  - { label: "Style 4 · 2 ảnh ngang xếp dọc", value: "s4" }
                  - { label: "Style 5 · 3 ảnh vuông hàng ngang", value: "s5" }
                  - { label: "Style 6 · 1 dọc trái + 2 phải", value: "s6" }
                  - { label: "Style 7 · 1 ngang trên + 2 dưới", value: "s7" }
                  - { label: "Style 8 · Lưới 2×2", value: "s8" }
                  - { label: "Style 9 · 1 bìa dọc + 3 phải", value: "s9" }
                  - { label: "Style 10 · 1 ngang trên + 3 dưới", value: "s10" }
              - name: "images"
                label: "Ảnh (theo thứ tự)"
                widget: "list"
                field:
                  name: "image"
                  label: "Ảnh"
                  widget: "image"
              - name: "date"
                label: "Ngày"
                widget: "datetime"
                date_format: "YYYY-MM-DD"
                time_format: false
                required: false
              - name: "order"
                label: "Thứ tự (số nhỏ lên trước)"
                widget: "number"
                value_type: "int"
                default: 1

  - name: "packages"
    label: "Design Packages"
    files:
      - name: "packages_data"
        label: "Packages"
        file: "data/packages.json"
        fields:
          - name: "basic"
            label: "Basic Package"
            widget: "object"
            fields:
              - name: "slug"
                label: "Slug"
                widget: "hidden"
                default: "basic"
              - name: "header_title"
                label: "Header Title"
                widget: "string"
              - name: "eyebrow"
                label: "Eyebrow"
                widget: "string"
              - name: "title"
                label: "Title"
                widget: "text"
              - name: "tagline"
                label: "Tagline"
                widget: "text"
              - name: "intro"
                label: "Intro Text"
                widget: "text"
              - name: "dropdown_label"
                label: "Dropdown Label"
                widget: "string"
              - name: "dropdown_tag"
                label: "Dropdown Tag"
                widget: "string"
              - name: "order"
                label: "Sort Order"
                widget: "number"
                value_type: "int"
                default: 1
              - name: "plans"
                label: "Plans"
                widget: "list"
                fields:
                  - name: "tier"
                    label: "Tier Label"
                    widget: "string"
                  - name: "name"
                    label: "Plan Name"
                    widget: "string"
                  - name: "price"
                    label: "Price"
                    widget: "string"
                  - name: "note"
                    label: "Price Note"
                    widget: "string"
                  - name: "featured"
                    label: "Featured (dark theme)"
                    widget: "boolean"
                    default: false
                  - name: "items"
                    label: "Included Items"
                    widget: "list"
                    field:
                      name: "item"
                      label: "Item"
                      widget: "string"
              - name: "gallery"
                label: "Gallery"
                widget: "list"
                required: false
                fields:
                  - name: "tone"
                    label: "Tone Class"
                    widget: "string"
                  - name: "label"
                    label: "Label"
                    widget: "string"
          - name: "social"
            label: "Social Media Package"
            widget: "object"
            fields:
              - name: "slug"
                label: "Slug"
                widget: "hidden"
                default: "social"
              - name: "header_title"
                label: "Header Title"
                widget: "string"
              - name: "eyebrow"
                label: "Eyebrow"
                widget: "string"
              - name: "title"
                label: "Title"
                widget: "text"
              - name: "tagline"
                label: "Tagline"
                widget: "text"
              - name: "intro"
                label: "Intro Text"
                widget: "text"
              - name: "dropdown_label"
                label: "Dropdown Label"
                widget: "string"
              - name: "dropdown_tag"
                label: "Dropdown Tag"
                widget: "string"
              - name: "order"
                label: "Sort Order"
                widget: "number"
                value_type: "int"
                default: 2
              - name: "plans"
                label: "Plans"
                widget: "list"
                fields:
                  - name: "tier"
                    label: "Tier Label"
                    widget: "string"
                  - name: "name"
                    label: "Plan Name"
                    widget: "string"
                  - name: "price"
                    label: "Price"
                    widget: "string"
                  - name: "note"
                    label: "Price Note"
                    widget: "string"
                  - name: "featured"
                    label: "Featured (dark theme)"
                    widget: "boolean"
                    default: false
                  - name: "items"
                    label: "Included Items"
                    widget: "list"
                    field:
                      name: "item"
                      label: "Item"
                      widget: "string"
              - name: "gallery"
                label: "Gallery"
                widget: "list"
                required: false
                fields:
                  - name: "tone"
                    label: "Tone Class"
                    widget: "string"
                  - name: "label"
                    label: "Label"
                    widget: "string"
